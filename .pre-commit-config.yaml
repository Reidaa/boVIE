---
repos:
  - repo: https://github.com/mpalmer/action-validator
    rev: v0.9.0
    hooks:
      - id: action-validator

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff-check
        args:
          - "--fix"
          - "--extend-select=I"
      - id: ruff-format
        args:
          - "--check"

